<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gloretto Hotel HMS</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(160deg, #fff7ef 0%, #ffe9d6 100%);
        color: #2d1f16;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(680px, 100%);
        border-radius: 18px;
        background: #ffffff;
        border: 1px solid #f1d8bf;
        box-shadow: 0 20px 45px rgba(45, 31, 22, 0.08);
        padding: 28px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.6rem;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.5;
      }
      .ok {
        display: inline-block;
        margin-top: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #e8fff0;
        border: 1px solid #9de1b8;
        color: #14532d;
        font-weight: 600;
      }
      code {
        background: #f7f2ee;
        border: 1px solid #efdfd2;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Gloretto Hotel HMS</h1>
      <p>The Android wrapper is loading local Capacitor web assets correctly.</p>
      <p>If you can see this screen, the black screen issue is fixed.</p>
      <p class="ok">App is working</p>
      <p><small>Loaded from <code>android/app/src/main/assets/public/index.html</code></small></p>
    </main>
  </body>
</html>
